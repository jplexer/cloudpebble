{% load i18n %}
<div id="publish-pane-template" class="hide publish-pane">
    <div class="well alert hide" id="publish-error"></div>

    <h3 id="publish-title" style="display: none;"></h3>

    <div class="well" id="publish-status-area">
        <p id="publish-status-text">Checking app store status...</p>
        <div class="progress progress-striped active" id="publish-preflight-progress">
            <div class="bar" style="width: 100%;"></div>
        </div>
    </div>

    <div id="publish-form-area" style="display: none;">
        <form class="form-horizontal" id="publish-form">
            <div class="well" id="publish-new-app-fields" style="display: none;">
                <h4>New App Details</h4>
                <div class="control-group">
                    <label class="control-label" for="publish-name">App Name</label>
                    <div class="controls">
                        <input type="text" id="publish-name" class="span9">
                    </div>
                </div>
                <div class="control-group">
                    <label class="control-label" for="publish-version">Version</label>
                    <div class="controls">
                        <input type="text" id="publish-version" class="span2">
                    </div>
                </div>
                <div class="control-group">
                    <label class="control-label" for="publish-description">Description</label>
                    <div class="controls">
                        <textarea id="publish-description" rows="4" class="span9" placeholder="Describe your app..."></textarea>
                    </div>
                </div>
                <div class="control-group">
                    <label class="control-label" for="publish-source">Source URL <span class="muted">(optional)</span></label>
                    <div class="controls">
                        <input type="text" id="publish-source" class="span9" placeholder="https://github.com/...">
                    </div>
                </div>
                <div class="control-group" id="publish-category-group" style="display: none;">
                    <label class="control-label" for="publish-category">Category</label>
                    <div class="controls">
                        <select id="publish-category" class="span4"></select>
                    </div>
                </div>
                <div class="control-group" id="publish-icon-group" style="display: none;">
                    <label class="control-label">Icons</label>
                    <div class="controls">
                        <label class="radio">
                            <input type="radio" name="publish-icon-mode" value="auto" checked>
                            Auto-generate icons
                        </label>
                        <label class="radio">
                            <input type="radio" name="publish-icon-mode" value="upload">
                            Upload icons
                        </label>
                        <div id="publish-icon-uploads" style="display: none; margin-top: 8px;">
                            <label>Small icon (48x48): <input type="file" id="publish-icon-small" accept="image/png"></label>
                            <label style="margin-top: 4px;">Large icon (144x144): <input type="file" id="publish-icon-large" accept="image/png"></label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="well">
                <div class="control-group">
                    <label class="control-label" for="publish-release-notes">Release Notes <span class="muted">(optional)</span></label>
                    <div class="controls">
                        <textarea id="publish-release-notes" rows="3" class="span9" placeholder="What's new in this version..."></textarea>
                    </div>
                </div>
            </div>

            <div class="well">
                <h4>Screenshots</h4>
                <p class="muted" id="publish-screenshot-hint">Capture screenshots from the emulator for each platform your app supports.</p>
                <div id="publish-screenshot-platforms"></div>
                <div style="margin-top: 8px;">
                    <button type="button" class="btn btn-block" id="publish-capture-btn" style="width: auto;">
                        Auto-generate All Platforms
                    </button>
                </div>
                <span id="publish-capture-status" class="muted" style="display: block; margin-top: 4px;"></span>
            </div>

            <div class="well">
                <p class="muted hide" id="publish-no-build-msg">
                    No successful build found. Please build your project before publishing.
                </p>
                <button type="submit" class="btn btn-primary btn-large btn-block" id="publish-submit-btn" disabled style="display: none; width: auto; font-size: 16px; padding: 12px 30px; font-weight: bold;">
                    Publish to App Store
                </button>
                <span id="publish-submit-status" style="margin-left: 8px;"></span>
            </div>
        </form>
    </div>

    <div id="publish-success" class="hide">
        <div class="well">
            <p><strong>Published successfully!</strong></p>
        </div>
        <div class="well">
            <div class="control-group" id="publish-success-store-link" style="margin-bottom: 0;">
                <label class="control-label">App Store</label>
                <div class="controls" style="padding-top: 5px;">
                    <a href="#" id="publish-app-link" target="_blank">View on App Store</a>
                </div>
            </div>
        </div>
        <div class="well">
            <div class="control-group" id="publish-success-dashboard-link" style="margin-bottom: 0;">
                <label class="control-label">Dashboard</label>
                <div class="controls" style="padding-top: 5px;">
                    <a href="#" id="publish-dashboard-link" target="_blank">Edit on Developer Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
